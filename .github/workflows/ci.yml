name: Acao 1 - Pipeline Inicial

on:
  push:
    branches: [ "main" ]

# CRUCIAL: Define permissões para que o token possa interagir com o registro de pacotes
permissions:
  contents: read
  packages: write

jobs:
  build:
    # Substitui 'image: docker:24.0.5' e 'services: dind' [cite: 57, 58]
    runs-on: ubuntu-latest 

    steps:
      # Passo necessário para o GitHub conseguir "enxergar" seu código
      - name: Checkout code
        uses: actions/checkout@v4

      # Equivalente ao 'before_script' e 'docker login' [cite: 59, 62]
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Equivalente ao bloco 'script' da Ação 1 [cite: 74, 76]
      - name: Executando o build
        run: echo "simulando um docker build"
      
      - name: Build Otimizado com Cache - Acao 3
        run: |
          # Define o nome da imagem e converte para minúsculo
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')

          # 1. Tenta baixar a imagem existente para usar como cache [cite: 116, 123]
          docker pull $IMAGE_ID:latest || true

          # 2. Build usando cache-from e BuildKit Inline Cache [cite: 118, 124, 125]
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from $IMAGE_ID:latest \
            -t $IMAGE_ID:${{ github.sha }} \
            -t $IMAGE_ID:latest .

          # 3. Push das novas imagens atualizadas [cite: 121, 122]
          docker push $IMAGE_ID:${{ github.sha }}
          docker push $IMAGE_ID:latest